<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        nav { background: #1a1a2e; padding: 15px 30px; display: flex; align-items: center; gap: 30px; }
        nav a { color: #eee; text-decoration: none; font-size: 15px; }
        nav a:hover { color: #e94560; }
        nav .brand { font-size: 20px; font-weight: bold; color: #e94560; margin-right: auto; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        h2 { margin-bottom: 20px; color: #1a1a2e; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        th { background: #1a1a2e; color: white; padding: 12px 15px; text-align: left; }
        td { padding: 11px 15px; border-bottom: 1px solid #eee; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9f9f9; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 13px; }
        .badge-green { background: #d4edda; color: #155724; }
        .badge-red { background: #f8d7da; color: #721c24; }
        .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: white; border-radius: 10px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
        .card h3 { font-size: 36px; color: #e94560; }
        .card p { color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">📚 LibraryMS</span>
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'book_list' %}">Books</a>
        <a href="{% url 'member_list' %}">Members</a>
        <a href="{% url 'borrow_list' %}">Borrowed</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
