{% extends 'library/base.html' %}
{% block content %}
<h2>Members</h2>
<table>
    <thead>
        <tr><th>Name</th><th>Email</th><th>Phone</th><th>Joined</th></tr>
    </thead>
    <tbody>
        {% for member in members %}
        <tr>
            <td>{{ member.name }}</td>
            <td>{{ member.email }}</td>
            <td>{{ member.phone }}</td>
            <td>{{ member.joined_on|date:"d M Y" }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="4" style="text-align:center; color:#999;">No members added yet.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
