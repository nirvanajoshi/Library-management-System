{% extends 'library/base.html' %}
{% block content %}
<h2>Books</h2>
<table>
    <thead>
        <tr><th>Title</th><th>Author</th><th>Category</th><th>Available</th><th>Total</th></tr>
    </thead>
    <tbody>
        {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.category }}</td>
            <td>
                <span class="badge {% if book.available_copies > 0 %}badge-green{% else %}badge-red{% endif %}">
                    {{ book.available_copies }}
                </span>
            </td>
            <td>{{ book.total_copies }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="5" style="text-align:center; color:#999;">No books added yet.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
