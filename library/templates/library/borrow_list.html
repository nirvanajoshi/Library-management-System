{% extends 'library/base.html' %}
{% block content %}
<h2>Currently Borrowed Books</h2>
<table>
    <thead>
        <tr><th>Member</th><th>Book</th><th>Borrow Date</th><th>Action</th></tr>
    </thead>
    <tbody>
        {% for record in records %}
        <tr>
            <td>{{ record.member.name }}</td>
            <td>{{ record.book.title }}</td>
            <td>{{ record.borrow_date|date:"d M Y" }}</td>
            <td>
                <a href="{% url 'return_book' record.id %}" style="background:#28a745; color:white; padding:5px 12px; border-radius:5px; text-decoration:none; font-size:13px;">Return</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="4" style="text-align:center; color:#999;">No active borrows.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
