{% extends 'library/base.html' %}
{% block content %}
<h2>Borrow a Book</h2>
<div style="background:white; padding:30px; border-radius:10px; max-width:500px; box-shadow:0 2px 8px rgba(0,0,0,0.08);">
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom:15px;">
            <label style="display:block; margin-bottom:5px; font-weight:600;">Select Member</label>
            {{ form.member }}
        </div>
        <div style="margin-bottom:20px;">
            <label style="display:block; margin-bottom:5px; font-weight:600;">Select Book</label>
            {{ form.book }}
        </div>
        <button type="submit" style="background:#e94560; color:white; border:none; padding:10px 25px; border-radius:6px; cursor:pointer; font-size:15px;">Borrow</button>
        <a href="{% url 'borrow_list' %}" style="margin-left:15px; color:#666;">Cancel</a>
    </form>
</div>
{% endblock %}
