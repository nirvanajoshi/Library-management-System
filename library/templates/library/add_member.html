{% extends 'library/base.html' %}
{% block content %}
<h2>Add New Member</h2>
<div style="background:white; padding:30px; border-radius:10px; max-width:500px; box-shadow:0 2px 8px rgba(0,0,0,0.08);">
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom:15px;">
            <label style="display:block; margin-bottom:5px; font-weight:600;">Name</label>
            <input type="text" name="name" required style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px;">
        </div>
        <div style="margin-bottom:15px;">
            <label style="display:block; margin-bottom:5px; font-weight:600;">Email</label>
            <input type="email" name="email" required style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px;">
        </div>
        <div style="margin-bottom:20px;">
            <label style="display:block; margin-bottom:5px; font-weight:600;">Phone</label>
            <input type="text" name="phone" style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px;">
        </div>
        <button type="submit" style="background:#e94560; color:white; border:none; padding:10px 25px; border-radius:6px; cursor:pointer; font-size:15px;">Add Member</button>
        <a href="{% url 'member_list' %}" style="margin-left:15px; color:#666;">Cancel</a>
    </form>
</div>
{% endblock %}
